version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devsecops-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
